<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="login-body">

<div class="logo">

<div class="login-box">

<div class="input-box">

<span>✉</span>

<input 
type="email"
id="username"
placeholder="Enter email"
autocomplete="off">

</div>


<small>
Default Seed: bihanoor444@gmail.com
</small>





<label>Password</label>


<div class="input-box">


<span>🔒</span>

type="password"
id="password"
placeholder="Enter password">


<button 
type="button"
class="show-btn"
onclick="togglePassword()">

👁

</button>


</div>


<small>
Default Pass: 12345
</small>




<label class="remember">

<input 
type="checkbox"
id="remember">

Remember Me

</label>

class="login-btn"
onclick="login()">

</button>



<p id="error"></p>

</div>
