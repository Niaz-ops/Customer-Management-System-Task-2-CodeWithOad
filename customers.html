<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer - Customer Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h2>CMS</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="customers.html">Customers</a>
        <a href="installments.html">Installments</a>
        <a href="reports.html">Reports</a>
        <a href="branches.html">Branches</a>
        <a href="cleared.html">Cleared</a>
    </div>
    <div class="main">
        <h2>Add Customer</h2>
        <div class="form">

            <input type="text" id="name" placeholder="Customer Name">
            <input type="text" id="father" placeholder="Father/Husband Name">
            <input type="text" id="mobile" placeholder="Mobile">
            <input type="text" id="city" placeholder="City/Area">
            <input type="date" id="date" placeholder="Purchase Date">
            <input type="number" id="totalItems" placeholder="Total Items">
            <input type="number" id="totalAmount" placeholder="Total Amount">
            <input type="number" id="advance" placeholder="Advance Payment">

            <button onclick="addCustomer()">Add Customer</button>
        </div>
        <h2 style="text-align: center;">Customer List</h2>
        
        <input type="text" id="searchInput" placeholder="Search by Name, ID, Mobile, Father Name, City"
            onkeyup="searchCustomer()">

        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Serial No</th>
                    <th>Customer ID</th>
                    <th>Name</th>
                    <th>Mobile</th>
                    <th>City</th>
                    <th>Purchase Date</th>
                    <th>Total Items</th>
                    <th>Total</th>
                    <th>Advance</th>
                    <th>Remaining</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="customerTable"></tbody>
        </table>
    </div>
</div>

<script src="customers.js"></script>
</body>
</html>
